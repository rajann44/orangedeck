name: orangedeck
description: "OrangeDeck - A Hacker News Tinder Swiper"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Database & Network
  dio: ^5.4.3
  hive_flutter: ^1.1.0

  # Navigation & Core UI
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  webview_flutter: ^4.7.0
  share_plus: ^7.2.1
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
